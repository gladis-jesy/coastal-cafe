<section class="bg-white py-16 px-4 md:px-20 max-w-7xl mx-auto">
  <h2 class="text-4xl font-extrabold mb-12 text-gray-900 italic text-center">Our Gallery</h2>

  <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
    @for (image of galleryImages; track image; let i = $index) {
      <button type="button"
        class="w-full h-[24rem] cursor-pointer p-0 border-0 bg-transparent"
        (click)="openLightbox(i)" (keydown.enter)="openLightbox(i)">
        <img [src]="image" alt="Gallery image" class="w-full h-full object-cover" />
      </button>
    }
  </div>

  @if (lightboxOpen) {
    <div class="fixed inset-0 bg-black/80 flex items-center justify-center z-50"
      role="dialog" aria-modal="true" tabindex="0"
      (click)="closeLightbox()" (keydown.escape)="closeLightbox()">
      <div class="relative max-w-3xl w-full px-4" tabindex="-1" (click)="$event.stopPropagation()" (keydown)="$event.stopPropagation()">
        <img [src]="galleryImages[currentIndex]" alt="Gallery image enlarged" class="w-full h-auto max-h-[80vh] mx-auto rounded shadow-lg" />

        <button (click)="prevImage($event)"
          class="absolute left-4 top-1/2 -translate-y-1/2 text-white text-3xl bg-black/50 px-3 py-2 rounded-full hover:bg-black">
          ‹
        </button>

        <button (click)="nextImage($event)"
          class="absolute right-4 top-1/2 -translate-y-1/2 text-white text-3xl bg-black/50 px-3 py-2 rounded-full hover:bg-black">
          ›
        </button>

        <button (click)="closeLightbox()"
          class="absolute top-4 right-4 text-white text-2xl hover:bg-gray-700 px-3 py-1 rounded">
          ✕
        </button>
      </div>
    </div>
  }
</section>
